<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio</title>

  <!-- Akira Expanded (use local or replace with similar if unavailable) -->
  <link href="https://fonts.cdnfonts.com/css/akira-expanded" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Akira Expanded', sans-serif;
    }

    body {
      background: #000;
      color: #fff;
      overflow-x: hidden;
    }

    .container {
      width: 90%;
      max-width: 1200px;
      margin: auto;
    }

    header {
      padding: 40px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 18px;
      letter-spacing: 2px;
    }

    .btn {
      padding: 10px 20px;
      border: 1px solid #fff;
      background: transparent;
      color: #fff;
      cursor: pointer;
      text-transform: uppercase;
      transition: 0.3s;
    }

    .btn:hover {
      background: #fff;
      color: #000;
    }

    .hero {
      padding: 100px 0;
    }

    .hero h2 {
      font-size: 42px;
      line-height: 1.4;
      max-width: 700px;
    }

    .hero span {
      opacity: 0.6;
    }

    .works {
      padding: 80px 0;
    }

    .works h3 {
      margin-bottom: 40px;
      font-size: 20px;
      opacity: 0.7;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      border: 1px solid #222;
      overflow: hidden;
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.03);
      border-color: #fff;
    }

    .card video,
    .card img {
      width: 100%;
      display: block;
    }

    .card p {
      padding: 10px;
      font-size: 12px;
      opacity: 0.6;
    }

    footer {
      padding: 60px 0;
      text-align: center;
      font-size: 12px;
      opacity: 0.5;
    }
  </style>
</head>
<body>

  <div class="container">

    <header>
      <h1>YOUR NAME</h1>
      <button class="btn">Contact</button>
    </header>

    <section class="hero">
      <h2>
        VIDEO EDITOR <br>
        & VFX ARTIST <br>
        <span>Creating cinematic visuals.</span>
      </h2>
    </section>

    <section class="works">
      <h3>Selected Works</h3>

      <div class="grid">

        <!-- Work 1 -->
        <div class="card">
          <video src="work1.mp4" autoplay muted loop></video>
          <p>Car Edit / Speed Ramp</p>
        </div>

        <!-- Work 2 -->
        <div class="card">
          <video src="work2.mp4" autoplay muted loop></video>
          <p>VFX Breakdown</p>
        </div>

        <!-- Work 3 -->
        <div class="card">
          <video src="work3.mp4" autoplay muted loop></video>
          <p>Cinematic Reel</p>
        </div>

        <!-- Work 4 -->
        <div class="card">
          <video src="work4.mp4" autoplay muted loop></video>
          <p>Event Edit</p>
        </div>

      </div>
    </section>

    <footer>
      © 2026 YOUR NAME
    </footer>

  </div>

</body>
</html>
